<!DOCTYPE html>
<html>
<head>
    <title>TravelMate</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #2196F3;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
        }

        .hero {
            text-align: center;
            padding: 50px;
            background-color: white;
        }

        .hero h2 {
            color: #2196F3;
        }

        .destinations {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 15px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        footer {
            background-color: #2196F3;
            color: white;
            text-align: center;
            padding: 15px;
        }

        button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0b7dda;
        }
    </style>
</head>
<body>

<header>
    <h1>TravelMate</h1>
    <p>Your Travel Companion</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Destinations</a>
    <a href="#">Packages</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Explore Amazing Places</h2>
    <p>Plan your dream vacation with TravelMate.</p>
    <button onclick="alert('Welcome to TravelMate!')">
        Get Started
    </button>
</section>

<section class="destinations">
    <div class="card">
        <h3>Goa</h3>
        <p>Enjoy beautiful beaches.</p>
    </div>

    <div class="card">
        <h3>Hyderabad</h3>
        <p>Explore historic monuments.</p>
    </div>

    <div class="card">
        <h3>Kerala</h3>
        <p>Experience nature and backwaters.</p>
    </div>
</section>

<footer>
    <p>&copy; 2026 TravelMate. All Rights Reserved.</p>
</footer>

</body>
</html>
